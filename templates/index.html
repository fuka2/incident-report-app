<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事故・インシデント報告書 作成支援</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Sans", "Meiryo", Arial, sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── ヘッダー ── */
  header {
    background: linear-gradient(135deg, #1a365d, #2b6cb0);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header .subtitle { font-size: 12px; opacity: 0.8; }
  .header-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
  }

  /* ── メインレイアウト ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── チャットエリア ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    gap: 10px;
    max-width: 82%;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.ai   { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .ai .avatar   { background: #ebf8ff; }
  .user .avatar { background: #e9d8fd; }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .ai .bubble {
    background: white;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .user .bubble {
    background: #3182ce;
    color: white;
    border-bottom-right-radius: 4px;
  }

  /* typing indicator */
  .typing .bubble { padding: 14px 18px; }
  .dots span {
    display: inline-block; width:8px; height:8px;
    background:#a0aec0; border-radius:50%; margin:0 2px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── 入力エリア ── */
  .input-area {
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #userInput {
    flex: 1;
    border: 2px solid #cbd5e0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    max-height: 120px;
    line-height: 1.5;
  }
  #userInput:focus { border-color: #3182ce; }
  #userInput::placeholder { color: #a0aec0; }

  .btn {
    border: none; cursor: pointer; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    padding: 10px 18px; transition: all 0.2s;
    white-space: nowrap;
  }
  #voiceBtn {
    background: #ebf8ff; color: #2b6cb0;
    border: 2px solid #bee3f8;
    padding: 10px 14px;
  }
  #voiceBtn:hover { background: #bee3f8; }
  #voiceBtn.recording { background: #fff5f5; color: #c53030; border-color: #feb2b2; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  #sendBtn {
    background: #3182ce; color: white;
    padding: 10px 20px;
  }
  #sendBtn:hover { background: #2b6cb0; }
  #sendBtn:disabled { background: #a0aec0; cursor: not-allowed; }

  .hint { font-size: 11px; color: #a0aec0; margin-top: 6px; text-align: center; }

  /* ── 報告書パネル ── */
  .report-panel {
    width: 380px;
    background: white;
    border-left: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .report-panel.hidden { display: none; }

  .report-header {
    background: #1a365d;
    color: white;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .rank-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: 900;
    margin: 12px 16px 0;
  }
  .rank-A { background: #fff5f5; color: #c53030; border: 2px solid #fc8181; }
  .rank-B { background: #fffaf0; color: #c05621; border: 2px solid #fbd38d; }
  .rank-C { background: #f0fff4; color: #276749; border: 2px solid #9ae6b4; }

  .rank-reason {
    font-size: 12px;
    color: #718096;
    padding: 6px 16px 12px;
    border-bottom: 1px solid #e2e8f0;
  }

  #reportFields {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group-title {
    font-size: 11px; font-weight: 700;
    color: #718096; text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 0 6px;
    border-bottom: 1px solid #e2e8f0;
    margin-bottom: 8px;
  }
  .field-item { margin-bottom: 8px; }
  .field-label { font-size: 11px; color: #a0aec0; margin-bottom: 2px; }
  .field-value {
    font-size: 13px; color: #2d3748;
    background: #f7fafc;
    padding: 6px 10px;
    border-radius: 6px;
    min-height: 28px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .field-value:empty::after { content: "—"; color: #cbd5e0; }

  .report-footer {
    padding: 14px 16px;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
  }
  #saveBtn {
    width: 100%;
    background: linear-gradient(135deg, #276749, #38a169);
    color: white;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
  }
  #saveBtn:hover { opacity: 0.9; }
  #saveBtn:disabled { background: #a0aec0; }

  #saveStatus {
    margin-top: 8px;
    font-size: 12px;
    text-align: center;
    min-height: 18px;
  }
  .status-ok  { color: #276749; }
  .status-err { color: #c53030; }

  /* ── モバイル対応 ── */
  @media (max-width: 768px) {
    .report-panel { display: none !important; }
  }
</style>
</head>
<body>

<header>
  <div>🏥</div>
  <div>
    <h1>事故・インシデント報告書 作成支援</h1>
    <div class="subtitle">AIが対話形式で報告書作成をサポートします</div>
  </div>
  <div class="header-badge">kintone 連携</div>
</header>

<div class="main">

  <!-- チャットエリア -->
  <div class="chat-area">
    <div id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="2"
          placeholder="起きたことを自由に入力してください…（Enterで送信）"></textarea>
        <button class="btn" id="voiceBtn" title="音声入力">🎤</button>
        <button class="btn" id="sendBtn">送信</button>
      </div>
      <div class="hint">Enterで送信 / Shift+Enterで改行 / 🎤 ボタンで音声入力（Chrome推奨）</div>
    </div>
  </div>

  <!-- 報告書プレビューパネル -->
  <div class="report-panel hidden" id="reportPanel">
    <div class="report-header">📋 生成された報告書</div>
    <div id="rankBadge"></div>
    <div class="rank-reason" id="rankReason"></div>
    <div id="reportFields"></div>
    <div class="report-footer">
      <button class="btn" id="saveBtn">💾 kintoneに保存する</button>
      <div id="saveStatus"></div>
    </div>
  </div>

</div>

<script>
// ── 状態管理 ──────────────────────────────────────────────
let messages = [];
let currentReport = null;
let isStreaming = false;

// フィールドグループ定義（表示順）
const FIELD_GROUPS = [
  { title: "基本情報", keys: ["報告区分","作成日","報告者氏名","報告者分類","所属"] },
  { title: "発生日時・場所", keys: ["発生施設","部署","事故関与者","発生日","発生時刻","発生場所：分類","発生場所：場所"] },
  { title: "対象者", keys: ["氏名","年齢","性別","利用区分","介護度","自立度","認知度","基礎疾患"] },
  { title: "事故内容", keys: ["事故分類","事故内容","けがの部位","けが等の詳細","症状","発生時の行動","発生・発見時の状況"] },
  { title: "バイタル", keys: ["バイタル：血圧","バイタル：脈拍","バイタル：体温","バイタル：血中酸素濃度","バイタル：意識レベル"] },
  { title: "処置・受診", keys: ["処置等","診察","院内医師の診察","院内診察：受診日時","院内診察：医師名","他科受診","他科受診：受診日時","他科受診：病院名"] },
  { title: "初期対応・家族連絡", keys: ["初期対応","家族連絡：実施の有無","家族連絡：連絡者（誰が）","家族連絡：連絡先（誰に）","家族連絡：反応","家族連絡：説明内容","家族連絡：返答内容"] },
  { title: "原因分析", keys: ["主要因","なぜ①","なぜ②"] },
  { title: "判定", keys: ["事故ランク","是正報告書の提出","判定理由","判定日"] },
];

// ── DOM操作ヘルパー ──────────────────────────────────────
function addMessage(role, text) {
  const wrap = document.createElement("div");
  wrap.className = `message ${role}`;
  wrap.innerHTML = `
    <div class="avatar">${role === "ai" ? "🤖" : "👤"}</div>
    <div class="bubble">${escHtml(text)}</div>`;
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
  return wrap.querySelector(".bubble");
}

function addTyping() {
  const wrap = document.createElement("div");
  wrap.className = "message ai typing";
  wrap.id = "typing";
  wrap.innerHTML = `<div class="avatar">🤖</div>
    <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function scrollBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// ── JSON抽出 ──────────────────────────────────────────────
function extractReport(text) {
  const m = text.match(/<<REPORT_JSON>>([\s\S]*?)<<END_JSON>>/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}

function stripJson(text) {
  return text.replace(/<<REPORT_JSON>>[\s\S]*?<<END_JSON>>/g, "").trim();
}

// ── 報告書パネル表示 ─────────────────────────────────────
function showReport(report) {
  currentReport = report;
  const panel = document.getElementById("reportPanel");
  panel.classList.remove("hidden");

  // ランクバッジ
  const rank = report.rank || "C";
  document.getElementById("rankBadge").innerHTML =
    `<div class="rank-badge rank-${rank}">ランク ${rank}</div>`;
  document.getElementById("rankReason").textContent =
    "判定理由：" + (report.rank_reason || "—");

  // フィールド一覧
  const container = document.getElementById("reportFields");
  container.innerHTML = "";
  const fields = report.fields || {};

  FIELD_GROUPS.forEach(group => {
    const hasValue = group.keys.some(k => fields[k]);
    if (!hasValue) return;
    const div = document.createElement("div");
    div.className = "field-group";
    div.innerHTML = `<div class="field-group-title">${group.title}</div>`;
    group.keys.forEach(key => {
      const val = fields[key];
      if (!val) return;
      div.innerHTML += `
        <div class="field-item">
          <div class="field-label">${escHtml(key)}</div>
          <div class="field-value">${escHtml(val)}</div>
        </div>`;
    });
    container.appendChild(div);
  });
}

// ── Claude API通信（SSE） ────────────────────────────────
async function sendToAI(userText) {
  if (isStreaming) return;
  isStreaming = true;

  messages.push({ role: "user", content: userText });
  addTyping();
  document.getElementById("sendBtn").disabled = true;

  let fullText = "";
  const bubble = document.createElement("div");

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages }),
    });

    removeTyping();
    const wrap = document.createElement("div");
    wrap.className = "message ai";
    wrap.innerHTML = `<div class="avatar">🤖</div>`;
    bubble.className = "bubble";
    wrap.appendChild(bubble);
    document.getElementById("messages").appendChild(wrap);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6);
        if (payload === "[DONE]") continue;
        try {
          const obj = JSON.parse(payload);
          if (obj.text) {
            fullText += obj.text;
            bubble.innerHTML = escHtml(stripJson(fullText));
            scrollBottom();
          }
        } catch {}
      }
    }

    // JSON抽出・表示
    const report = extractReport(fullText);
    if (report) showReport(report);

    messages.push({ role: "assistant", content: fullText });

  } catch (err) {
    removeTyping();
    addMessage("ai", "⚠️ エラーが発生しました: " + err.message);
  } finally {
    isStreaming = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("userInput").focus();
  }
}

// ── kintone保存 ──────────────────────────────────────────
async function saveToKintone() {
  if (!currentReport) return;
  const btn = document.getElementById("saveBtn");
  const status = document.getElementById("saveStatus");
  btn.disabled = true;
  btn.textContent = "⏳ 保存中...";
  status.textContent = "";

  try {
    const resp = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fields: currentReport.fields }),
    });
    const result = await resp.json();
    if (result.success) {
      btn.textContent = "✅ 保存完了";
      status.className = "status-ok";
      status.textContent = `kintone レコードNo.${result.record_id} に保存されました`;
      addMessage("ai", `✅ kintoneへの保存が完了しました！\nレコードNo.${result.record_id} として登録されています。`);
    } else {
      throw new Error(result.error);
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = "💾 kintoneに保存する";
    status.className = "status-err";
    status.textContent = "❌ 保存失敗: " + err.message;
  }
}

// ── 音声入力 ─────────────────────────────────────────────
let recognition = null;
let isRecording = false;

function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById("voiceBtn");

  if (!SpeechRecognition) {
    btn.title = "音声入力はChrome/Edgeで利用できます";
    btn.style.opacity = "0.4";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let interim = "", final = "";
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    const input = document.getElementById("userInput");
    input.value = final || interim;
  };

  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove("recording");
    btn.textContent = "🎤";
  };

  btn.addEventListener("click", () => {
    if (isRecording) {
      recognition.stop();
    } else {
      recognition.start();
      isRecording = true;
      btn.classList.add("recording");
      btn.textContent = "⏹";
    }
  });
}

// ── イベントリスナー ─────────────────────────────────────
document.getElementById("sendBtn").addEventListener("click", () => {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = "";
  input.style.height = "auto";
  addMessage("user", text);
  sendToAI(text);
});

document.getElementById("userInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("sendBtn").click();
  }
});

// テキストエリア自動リサイズ
document.getElementById("userInput").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

document.getElementById("saveBtn").addEventListener("click", saveToKintone);

// ── 起動時のAIあいさつ ──────────────────────────────────
window.addEventListener("load", () => {
  setupVoice();
  // 最初のメッセージをAIから送る
  addTyping();
  setTimeout(() => {
    removeTyping();
    const greet = `こんにちは。事故・インシデント報告書の作成をお手伝いします 🏥

まず確認させてください。今回の報告は以下のどれに当たりますか？

　① 事故
　② 問題（外部）
　③ 問題（内部）
　④ ヒヤリハット

番号または名称でお答えください。その後、何があったか時系列でお話しいただければ、必要な情報を確認しながら報告書を完成させます。`;
    const bubble = addMessage("ai", greet);
    messages.push({ role: "assistant", content: greet });
  }, 800);
});
</script>
</body>
</html>
